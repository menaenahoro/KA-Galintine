name: KA Galintine - Retrigger

on:
  workflow_run:
    workflows: ["KA Galintine - Style Transform"]
    types:
      - completed

jobs:
  retrigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger next run of Style Transform
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}   # Personal Access Token — see setup below
        run: |
          gh workflow run galantine.yaml \
            --repo ${{ github.repository }}

      - name: Delete this retrigger run (keep history clean)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: gh run delete ${{ github.run_id }} --repo ${{ github.repository }}