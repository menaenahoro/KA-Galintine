name: KA Galintine - Retrigger

on:
  workflow_run:
    workflows: ["KA Galintine - Style Transform"]
    types:
      - completed

jobs:
  retrigger:
    runs-on: ubuntu-latest

    steps:
      - name: Wait 5 minutes before next run
        run: sleep 300

      - name: Trigger next run of Style Transform
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          gh workflow run galantine.yaml \
            --repo ${{ github.repository }}

      - name: Delete the completed main workflow run (not this one)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # Delete the main workflow run that triggered this retrigger
          # github.event.workflow_run.id is the ID of the run that just completed
          gh run delete ${{ github.event.workflow_run.id }} \
            --repo ${{ github.repository }} || echo "Could not delete run — skipping"