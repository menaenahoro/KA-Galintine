name: KA Galintine - Style Transform

on:
  workflow_dispatch:   # manual trigger + called by the re-trigger workflow
  schedule:
    - cron: '*/5 * * * *'  # GitHub best-effort fallback in case chain breaks

jobs:
  transform:
    runs-on: ubuntu-latest

    concurrency:
      group: style-transform
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install google-genai google-auth google-auth-oauthlib google-api-python-client pillow python-dotenv tqdm==4.67.3

      - name: Run style transform
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python src/main.py

      # - name: Delete this workflow run (keep history clean)
      #   if: always()
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #   run: gh run delete ${{ github.run_id }} --repo ${{ github.repository }}