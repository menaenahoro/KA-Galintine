name: KA Galintine - Style Transform

on:
  schedule:
    - cron: '*/5 * * * *'  # GitHub best-effort trigger — may be delayed
  workflow_dispatch:        # manual trigger from GitHub UI
  workflow_run:             # re-triggers itself after each run (reliable 5-min loop)
    workflows: ["KA Galintine - Style Transform"]
    types:
      - completed

jobs:
  transform:
    runs-on: ubuntu-latest

    # Prevent multiple runs stacking up if a previous one is still going
    concurrency:
      group: style-transform
      cancel-in-progress: false   # let the current run finish, queue the next

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install google-genai google-auth google-auth-oauthlib google-api-python-client pillow python-dotenv tqdm==4.67.3

      - name: Run style transform
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        run: python src/main.py
      # - name: Delete this workflow run
      #   if: always()   # runs even if previous steps failed
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # built-in, no setup needed
      #   run: |
      #     gh run delete ${{ github.run_id }} --repo ${{ github.repository }}